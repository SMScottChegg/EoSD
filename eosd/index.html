<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EoSD Incident Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Main 3-Column Area -->
        <div id="main-content">
            
            <!-- LEFT: Settings & Map -->
            <div id="col-left">
                <div class="panel-header">World State</div>
                <div id="location-details" class="info-box">
                    <h3 id="loc-name">Location</h3>
                    <p id="loc-desc">Description goes here.</p>
                    <hr>
                    <h4>Known Presence:</h4>
                    <div id="loc-chars"></div>
                </div>
                <div class="panel-header" style="margin-top: 15px;">Travel</div>
                <div id="location-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- CENTER: Visual Novel Display -->
            <div id="col-center">
                <div id="vn-background"></div>
                <img id="vn-heroine" class="vn-sprite sprite-left" src="" alt="Heroine">
                <img id="vn-enemy" class="vn-sprite sprite-right" src="" alt="Enemy">
            </div>

            <!-- RIGHT: Chat Log -->
            <div id="col-right" style="position: relative;">
                <div class="panel-header">Story Log</div>
                <div id="chat-log">
                    <!-- Chat messages injected here -->
                </div>
                
                <!-- Floating Swipe Controls -->
                <div id="swipe-controls">
                    <button id="btn-swipe-left" title="Previous Swipe">⬅️</button>
                    <button id="btn-swipe-right" title="Next Swipe / Reroll">➡️</button>
                </div>
            </div>

        </div>

        <!-- BOTTOM: Input Bar -->
        <div id="bottom-bar">
            <button id="btn-settings" title="Settings">⚙️</button>
            <button id="btn-devtools" title="Dev Tools">🛠️</button>
            <textarea id="player-input" placeholder="What do you do/say? (Press Enter to send, Shift+Enter for new line)"></textarea>
            <button id="btn-send">Send</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Display Settings</h3>
            <label>Text Size: <input type="range" id="setting-text-size" min="12" max="24" value="16"></label>
            <label>Theme Color: <input type="color" id="setting-theme-color" value="#aa0000"></label>
            <button id="btn-close-settings" style="margin-top: 15px; width: 100%;">Close</button>
        </div>
    </div>

    <!-- Dev Tools Modal -->
    <div id="devtools-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Developer Tools</h3>
            <label>Set Heroine: 
                <select id="dev-heroine-select"></select>
            </label>
            <label>Set Enemy: 
                <select id="dev-enemy-select"></select>
            </label>
            <label>Set Location: 
                <select id="dev-location-select"></select>
            </label>
            <button id="btn-apply-dev" style="margin-top: 15px; width: 100%;">Apply & Close</button>
            <button id="btn-close-dev" style="margin-top: 5px; width: 100%; background-color: #333;">Close</button>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
